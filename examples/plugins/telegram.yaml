apiVersion: flowforge/v1alpha1
kind: Workflow

metadata:
  name: telegram-plugin-example
  labels:
    plugin: telegram
  annotations:
    description: Sends an incoming Telegram message to an admin chat.
    credentials: Use examples/secrets/telegram-bot.yaml and examples/secrets/telegram-proxy.yaml for live mode.

spec:
  trigger:
    type: telegram.message
    as: message

  steps:
    - id: forward_to_admin
      do: telegram.send
      as: sent
      with:
        to: "$inputs.admin_chat_id"
        text: "$message.text"
        parse_mode: HTML
        disable_notification: true
